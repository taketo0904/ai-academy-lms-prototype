<meta charset="utf-8">
<title>業務AIエージェント辞書 — タスクディクショナリ</title>
<style>
  :root{
    --canvas:#F7F8FB;--surface:#FFFFFF;--ink:#141A2E;--muted:#5A617A;--faint:#8A90A6;
    --line:#E4E7F0;--line-strong:#D3D8E6;--accent:#5B4BE1;--accent-ink:#3E30B8;--accent-wash:#EEECFB;
    --coral:#FF6B4A;--coral-wash:#FFEDE7;--green:#12B76A;--green-wash:#E4F7EE;--violet:#8B5CF6;--violet-wash:#F1EBFB;
    --shadow:0 1px 2px rgba(20,26,46,.06),0 8px 24px rgba(20,26,46,.06);
    --shadow-lg:0 12px 40px rgba(20,26,46,.16);--r:14px;
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .tnum{font-variant-numeric:tabular-nums}
  .mono{font-family:var(--mono)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  .hidden{display:none!important}

  .topbar{position:sticky;top:0;z-index:40;height:60px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 22px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.06em;font-size:14px}
  .logo .dot{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--coral),var(--accent));display:grid;place-items:center;font-size:14px;color:#fff}
  .logo small{display:block;font-size:9.5px;font-weight:600;color:var(--faint);letter-spacing:.02em}
  .seg{display:flex;background:var(--canvas);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
  .seg button{border:none;background:transparent;padding:6px 15px;border-radius:6px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.active{background:var(--accent);color:#fff}
  .topbar .spacer{flex:1}
  .icobtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;font-size:16px;color:var(--muted);position:relative}
  .icobtn:hover{background:var(--canvas)}
  .icobtn .badge{position:absolute;top:-4px;right:-4px;background:var(--coral);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px}
  .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#5B4BE1,#8b7bf0);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}

  .layout{display:grid;grid-template-columns:236px 1fr;align-items:start}
  .side{position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;border-right:1px solid var(--line);background:var(--surface);padding:18px 12px}
  .side .grp{margin-bottom:6px}
  .side .grp>.ttl{font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.08em;padding:14px 12px 6px;text-transform:uppercase}
  .navitem{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;text-align:left;padding:9px 12px;border-radius:9px;font-size:13.5px;color:var(--ink);font-weight:500}
  .navitem .ic{width:20px;text-align:center;font-size:15px;flex-shrink:0}
  .navitem .code{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
  .navitem .ct{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
  .navitem:hover{background:var(--canvas)}
  .navitem.active{background:var(--accent-wash);color:var(--accent-ink);font-weight:700}
  .navitem.active .ct{color:var(--accent-ink)}
  .navitem .newtag{margin-left:auto;background:var(--coral);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;letter-spacing:.05em}

  .main{padding:26px 30px 60px;min-width:0}
  .crumb{font-size:12.5px;color:var(--faint);margin-bottom:16px}
  .crumb b{color:var(--muted);font-weight:600}
  .libhead{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
  .libhead h1{font-size:21px;margin:0;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .libhead .count{font-size:12.5px;color:var(--muted);font-weight:600;background:var(--canvas);border:1px solid var(--line);padding:3px 10px;border-radius:20px}
  .libhead .spacer{flex:1}
  .libsub{font-size:14px;color:var(--muted);margin:0 0 20px;max-width:72ch}
  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:8px 12px;min-width:250px}
  .search input{border:none;outline:none;font-size:14px;width:100%;background:transparent;color:var(--ink)}
  .search .ic{color:var(--faint)}
  .viewtog{display:flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
  .viewtog button{border:none;background:#fff;width:38px;height:37px;font-size:15px;color:var(--muted);display:grid;place-items:center}
  .viewtog button.active{background:var(--accent);color:#fff}

  .contentgrid{display:grid;grid-template-columns:1fr 300px;gap:26px;align-items:start}
  @media(max-width:1100px){.contentgrid{grid-template-columns:1fr}.aside{display:none}}

  .midgrp{margin-bottom:26px}
  .midh{font-size:13px;font-weight:800;color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:9px}
  .midh .code{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:600}
  .midh .ln{flex:1;height:1px;background:var(--line)}

  .cards.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px}
  /* ワークフロー選択：Trelloのカード型（縦長）を横スライドで選ぶ形式（会議決定に準拠） */
  .flowcarousel{display:flex;gap:16px;overflow-x:auto;padding:4px 4px 16px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
  .flowcarousel::-webkit-scrollbar{height:7px}
  .flowcarousel::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}
  .flowposter{flex:0 0 216px;scroll-snap-align:start;border-radius:18px;overflow:hidden;cursor:pointer;border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow);display:flex;flex-direction:column;transition:transform .16s,box-shadow .16s;text-align:left;padding:0}
  .flowposter:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  .flowposter .fthumb{height:170px;display:flex;flex-direction:column;justify-content:space-between;padding:14px;color:#fff;position:relative}
  .flowposter .fglyph{font-size:34px;align-self:center;margin:auto 0}
  .flowposter .fbadge{align-self:flex-start;background:rgba(255,255,255,.22);backdrop-filter:blur(2px);font-size:11px;font-weight:800;padding:4px 9px;border-radius:99px}
  .flowposter .fbody{padding:14px;flex:1;display:flex;flex-direction:column}
  .flowposter .ftitle{font-weight:800;font-size:14px;line-height:1.4;margin-bottom:6px;color:var(--ink)}
  .flowposter .fmeta{font-size:12px;color:var(--muted);line-height:1.6}
  .flowhint{font-size:12px;color:var(--faint);margin:-6px 0 14px;display:flex;align-items:center;gap:6px}
  .flowposter .fquick{margin-top:auto;padding-top:10px;width:100%;font-size:12.5px;padding-left:10px;padding-right:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s,border-color .16s;text-align:left;width:100%;padding:0;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--line-strong)}
  .thumb{aspect-ratio:16/9;position:relative;display:grid;place-items:center;color:#fff}
  .thumb .glyph{font-size:32px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.22))}
  .thumb .code{position:absolute;right:8px;bottom:8px;background:rgba(20,26,46,.8);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;font-family:var(--mono)}
  .thumb .stat{position:absolute;left:8px;top:8px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
  .thumb .stat.ready{background:var(--green);color:#fff}
  .thumb .stat.build{background:#fff;color:var(--coral)}
  .thumb .stat.owned{background:var(--ink);color:#fff}
  .thumb .fresh{position:absolute;right:8px;top:8px;background:rgba(255,255,255,.94);color:var(--violet);font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px}
  .card .body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card .title{font-size:14px;font-weight:700;line-height:1.4}
  .card .meta{font-size:11px;color:var(--faint)}
  .card .astrip{margin-top:auto;display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;padding-top:9px;border-top:1px solid var(--line)}
  .card .astrip.g{color:var(--accent-ink)}
  .card .astrip.o{color:var(--green)}
  .card .astrip.b{color:var(--coral)}
  .card .astrip .ai{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:11px;flex-shrink:0}
  .card .astrip.g .ai{background:var(--accent-wash)}
  .card .astrip.o .ai{background:var(--green-wash)}
  .card .astrip.b .ai{background:var(--coral-wash)}

  .cards.list{display:flex;flex-direction:column;gap:11px}
  .cards.list .card{flex-direction:row;align-items:stretch}
  .cards.list .thumb{width:150px;aspect-ratio:16/10;flex-shrink:0}
  .cards.list .body{flex:1}
  @media(max-width:560px){.cards.list .thumb{width:110px}}

  .aside{display:flex;flex-direction:column;gap:16px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .panel h3{font-size:13.5px;margin:0 0 12px;font-weight:800;display:flex;align-items:center;gap:8px}
  .notice{font-size:13px;color:var(--muted);padding:10px 0;border-bottom:1px solid var(--line);display:flex;gap:10px}
  .notice:last-child{border-bottom:none;padding-bottom:0}
  .notice .tag{font-size:10px;font-weight:700;color:var(--coral);background:var(--coral-wash);padding:2px 6px;border-radius:5px;height:fit-content;white-space:nowrap}
  .mini{display:flex;flex-direction:column;gap:11px}
  .mini .row{display:flex;align-items:center;gap:10px;font-size:12.5px}
  .mini .ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:15px;color:#fff;flex-shrink:0}
  .mini .t{font-weight:700;line-height:1.3}
  .mini .s{color:var(--faint);font-size:11px}
  .diag{display:flex;gap:10px;margin-bottom:11px}
  .diag .dn{flex-shrink:0;width:26px;height:26px;border-radius:8px;background:var(--accent-wash);color:var(--accent-ink);display:grid;place-items:center;font-weight:800;font-size:12px}
  .diag .dt{font-weight:700;font-size:12.5px}
  .diag .dd{font-size:11px;color:var(--muted);line-height:1.5}

  /* detail */
  .detail{max-width:1000px}
  .backbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-strong);background:#fff;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:18px}
  .backbtn:hover{background:var(--canvas)}
  .hero{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);color:#fff;padding:26px 26px 24px;position:relative}
  .hero .hcode{font-family:var(--mono);font-size:12px;opacity:.85;font-weight:600}
  .hero h1{font-size:26px;margin:6px 0 8px;font-weight:800;letter-spacing:-.01em;text-wrap:balance}
  .hero .hmeta{font-size:13px;opacity:.9;display:flex;gap:14px;flex-wrap:wrap}
  .hero .hglyph{position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.32}
  .dgrid{display:grid;grid-template-columns:1fr 320px;gap:22px;margin-top:22px;align-items:start}
  @media(max-width:820px){.dgrid{grid-template-columns:1fr}}
  .dsec{margin-bottom:20px}
  .dsec .lb{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px}
  .dsec p{font-size:14px;color:var(--muted);margin:0;line-height:1.75}
  .agentbox{background:linear-gradient(135deg,var(--accent-wash),#fff);border:1px solid var(--line-strong);border-radius:14px;padding:18px}
  .agentbox .an{font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px}
  .agentbox .atag{font-size:12.5px;color:var(--accent-ink);font-weight:600;margin:3px 0 9px}
  .agentbox .ad{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
  .btn{border:none;border-radius:10px;font-size:13.5px;font-weight:800;padding:12px 14px;width:100%;transition:background .15s,transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn.get{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(91,75,225,.28)}
  .btn.get:hover{background:var(--accent-ink)}
  .btn.use{background:var(--ink);color:#fff;margin-top:8px}
  .btn.have{background:var(--green-wash);color:var(--green);cursor:default}
  .btn.req{background:var(--coral);color:#fff}
  .buildbox{background:var(--coral-wash);border:1px solid #f4c3b6;border-radius:14px;padding:18px}
  .buildbox .bh{font-weight:800;font-size:15px;color:#c0392b;display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .buildbox p{font-size:12.5px;color:#8a3323;margin:0 0 14px;line-height:1.65}
  .freshcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow)}
  .freshcard .ft{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:8px}
  .freshcard .fm{font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.6}
  .persona{font-size:10.5px;color:var(--violet);font-weight:800;background:var(--violet-wash);padding:2px 8px;border-radius:20px;margin-left:auto}

  .empty{text-align:center;padding:70px 20px;color:var(--faint)}
  .empty .big{font-size:40px;margin-bottom:12px}

  /* modal */
  .mscrim{position:fixed;inset:0;background:rgba(20,26,46,.5);backdrop-filter:blur(3px);z-index:80;display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .mscrim.on{opacity:1;pointer-events:auto}
  .modal{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);transform:scale(.96);transition:transform .2s;max-height:88vh;overflow-y:auto}
  .mscrim.on .modal{transform:scale(1)}
  .modal h3{font-size:19px;margin:0 0 4px;font-weight:800}
  .modal .msub{font-size:13.5px;color:var(--muted);margin:0 0 18px}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;opacity:0;transition:opacity .25s,transform .25s;display:flex;align-items:center;gap:10px;max-width:92vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .em{font-size:18px}
  /* setup guide */
  .levels{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  @media(max-width:640px){.levels{grid-template-columns:1fr}}
  .lvl{background:var(--surface);border:1px solid var(--line-strong);border-radius:12px;padding:15px;text-align:left;box-shadow:var(--shadow);transition:border-color .15s,background .15s}
  .lvl:hover{border-color:var(--accent)}
  .lvl.on{border-color:var(--accent);background:var(--accent-wash);box-shadow:0 0 0 3px var(--accent-wash)}
  .lvl .ln{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.04em}
  .lvl.on .ln{color:var(--accent-ink)}
  .lvl .lt{font-size:16px;font-weight:800;margin:4px 0 3px}
  .lvl .ld{font-size:11.5px;color:var(--muted);line-height:1.5}
  .pbar{height:8px;background:var(--line);border-radius:5px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#8b7bf0);border-radius:5px;transition:width .3s}
  .steps2{display:flex;flex-direction:column;gap:10px;max-width:760px}
  .step2{display:flex;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)}
  .step2.done{background:var(--green-wash);border-color:#bfe0db}
  .step2 .chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--line-strong);flex-shrink:0;display:grid;place-items:center;font-size:14px;color:transparent;background:#fff}
  .step2.done .chk{background:var(--green);border-color:var(--green);color:#fff}
  .step2 .s2b{flex:1;min-width:0}
  .step2 .s2n{font-size:11px;font-weight:800;color:var(--faint)}
  .step2 .s2t{font-size:15px;font-weight:800;margin:2px 0 3px}
  .step2.done .s2t{color:var(--muted)}
  .step2 .s2d{font-size:13px;color:var(--muted);line-height:1.6}
  .step2 .s2a{margin-top:10px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--accent);color:var(--accent-ink);background:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px}
  .step2 .s2a:hover{background:var(--accent-wash)}
  .lbadge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
  .lbadge.term{background:var(--violet-wash);color:var(--violet)}
  .lbadge.use{background:var(--green-wash);color:var(--green)}
  .lbadge.money{background:#FBEEDC;color:#B45309}
  .player{background:#0d1120;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);max-width:760px}
  .player .screen{aspect-ratio:16/9;position:relative;display:grid;place-items:center;background:radial-gradient(80% 80% at 50% 35%,#22284a,#0d1120)}
  .player .playbtn{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.14);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);display:grid;place-items:center;color:#fff;font-size:26px;transition:transform .15s,background .15s}
  .player .playbtn:hover{transform:scale(1.06);background:rgba(91,75,225,.5)}
  .player .ph{position:absolute;bottom:14px;left:16px;right:16px;font-size:11.5px;color:rgba(255,255,255,.42)}
  .imgframe{aspect-ratio:16/9;border-radius:16px;display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-lg);position:relative;text-align:center;max-width:760px}
  .imgframe .big{font-size:54px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
  .imgframe .cap{position:absolute;bottom:14px;left:16px;right:16px;font-size:11.5px;color:rgba(255,255,255,.85)}
  /* io definition */
  .iorow{display:flex;gap:10px;align-items:stretch;margin-top:4px}
  .iocell{flex:1;background:var(--canvas);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .iocell .ioh{font-size:10.5px;font-weight:800;color:var(--faint);letter-spacing:.05em;margin-bottom:4px}
  .iocell .iov{font-size:12.5px;color:var(--ink);line-height:1.55}
  .ioarrow{display:grid;place-items:center;color:var(--faint);font-size:18px;flex-shrink:0}
  @media(max-width:560px){.iorow{flex-direction:column}.ioarrow{transform:rotate(90deg)}}
  /* flow (連携ワークフロー) */
  .flowrail{position:relative;max-width:760px;margin-top:6px}
  .flowrail:before{content:"";position:absolute;left:16px;top:16px;bottom:20px;width:2px;background:var(--line-strong)}
  .flowstep{display:flex;gap:14px;position:relative;margin-bottom:12px;align-items:flex-start}
  .flowstep .fnode{width:34px;height:34px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0;z-index:1;box-shadow:0 0 0 4px var(--canvas)}
  .flowstep.b .fnode{background:var(--coral)}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px;flex:1;min-width:0;box-shadow:var(--shadow)}
  .fcard .fn{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fbadge{font-size:10px;font-weight:800;background:var(--coral-wash);color:var(--coral);padding:2px 7px;border-radius:5px}
  .fio{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:11.5px;flex-wrap:wrap}

function downloadText(filename,text){
  try{
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();

  }catch(e){toast("この環境ではDL不可（公開URLでは可能）","⬇️");}
}
/* 成果物をExcelで開けるCSVに変換。Markdown表があれば表として、なければ1行=1列として書き出す */
function textToCSVRows(text){
  const lines=text.replace(/\r\n?/g,"\n").split("\n");
  const tableLines=lines.filter(l=>/^\s*\|.*\|\s*$/.test(l));
  if(tableLines.length>=2){
    return tableLines
      .filter(l=>!/^\s*\|[\s:\-|]+\|\s*$/.test(l))
      .map(l=>l.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim()));
  }
  return lines.filter(l=>l.trim()!=="").map(l=>l.includes("\t")?l.split("\t"):[l]);
}
function downloadCSV(filename,text){
  try{
    const esc=v=>{const s=String(v??"");return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    const csv=textToCSVRows(text).map(r=>r.map(esc).join(",")).join("\r\n");
    const blob=new Blob([String.fromCharCode(0xFEFF)+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Excel用に保存しました","📊");
  }catch(e){toast("この環境ではDL不可（公開URLでは可能）","⬇️");}
}
/* エージェントAPI実行（ストリーミング対応・失敗時はメッセージ表示） */
async function callAgentApi(path,body,resultEl){
  const base=getApiBase().replace(/\/$/,"");const key=getApiKey();
  resultEl.textContent="実行中…";
  try{
    const res=await fetch(base+path,{method:"POST",headers:{"content-type":"application/json",...(key?{"x-api-key":key}:{})},body:JSON.stringify(body)});
    if(!res.ok){resultEl.textContent=`エラー: HTTP ${res.status}。APIのデプロイ・認証・CORS設定をご確認ください。`;return null;}
    if(res.body&&res.body.getReader){
      const reader=res.body.getReader();const dec=new TextDecoder();let out="";resultEl.textContent="";
      for(;;){const {done,value}=await reader.read();if(done)break;out+=dec.decode(value,{stream:true});resultEl.textContent=out;}
      return out;
    }
    const txt=await res.text();resultEl.textContent=txt;return txt;
  }catch(e){resultEl.textContent=`接続できませんでした（${e.message}）。API未デプロイ／CORS設定をご確認ください。`;return null;}
}

/* ワークフロー一覧のカードから、詳細ページに行かず直接実行する（会議決定：この中でエージェントを使えるように） */
function openWorkflowRunModal(w){
  if(!isSubscriber()){openModal("🔒 ワークフロー実行は契約者限定です","連携ワークフローの実行は有料プラン（標準・プレミアム）でご利用いただけます。",`<button class="btn get" id="toPlansWfQ">プランを見てアップグレード</button>`);const b=$("#toPlansWfQ");if(b)b.onclick=()=>{$("#mscrim").classList.remove("on");state.route="plans";renderAll();window.scrollTo(0,0);};return;}
  const conn=apiConnected();
  openModal(`🔗 ${w.name} を実行`,conn?"本番APIに接続して、各ステップを直列連携で実行します。":"未接続のためサンプル出力を表示します（設定でAPIを繋ぐと本物が動きます）。",
    `<div class="reqfield"><label>最初の入力（${w.steps[0].in}）</label><textarea id="qwfIn" placeholder="ここに入力"></textarea></div>
     <button class="btn get" id="qwfGo">${conn?"▶ ワークフローを実行":"▶ サンプルで実行"}</button>
     <div class="output" id="qwfOut" style="margin-top:14px;display:none"></div>
     ${outputActions()}`);
  $("#qwfGo").onclick=async()=>{
    if(getUsage()>=limitFor(getPlan())){openUpsell();return;}
    setUsage(getUsage()+1);
    const input=($("#qwfIn").value||"").trim();const out=$("#qwfOut");out.style.display="block";
    let text;
    if(conn){text=await callAgentApi(`/v1/workflows/${w.id}/run`,{input,context:bizContext()},out);}
    else{
      let cur=input||"（未入力）";const lines=[`【ワークフロー: ${w.name}】（サンプル実行）\n`];
      w.steps.forEach((s,i)=>{
        if(s.build){lines.push(`▼ STEP ${i+1} ${s.agent}（未整備・スキップ）`);return;}
        const o=`${s.out}（サンプル）`;lines.push(`▼ STEP ${i+1} ${s.agent}\n  入力: ${cur}\n  出力: ${o}`);cur=o;
      });
      lines.push(`\n＝ 最終成果物 ＝\n${cur}`);text=lines.join("\n");out.textContent=text;
    }
    if(text)wireOutputActions(()=>out.textContent,`${w.name}.txt`);
  };
}

/* 時事ニュース フィード */
function newsRelevant(n){
  if(!hasProfile())return false;
  const p=getProfile();const r=roleOf(p.role);const cat=r&&r.cat!=="all"?r.cat:null;
  return (n.tasks||[]).some(id=>{const t=taskById(id);if(!t)return false;
    return (cat&&t.cat===cat)||((p.tags&&p.tags.length)&&tagsOf(id).some(g=>p.tags.includes(g)));});
}
function newsCard(n){
  const c=catOf(n.cat)||catOf("all");const isNew=n.id===justPushed;const rel=newsRelevant(n);
  const card=el("div","news"+(isNew?" isnew":""));
  const tags=(n.tasks||[]).map(id=>{const t=taskById(id);return t?`<button class="ntag" data-task="${id}">${t.name}</button>`:"";}).join("");
  card.innerHTML=`
    <div class="nico" style="background:${c.grad}">${c.icon}</div>
    <div class="nbody">
      <div class="ntop"><span class="src">${n.src}</span><span>・</span><span class="ntime">${ago(n.min)}</span>${isNew?`<span class="newnow">NEW</span>`:``}${rel?`<span class="newnow" style="background:var(--violet)">あなた向け</span>`:``}</div>
      <div class="nt">${n.title}</div>
      <div class="ns">${n.summary}</div>
      ${tags?`<div class="ntags"><span class="lbl">この情報が効く業務:</span>${tags}</div>`:``}
    </div>`;
  card.querySelectorAll('[data-task]').forEach(b=>b.onclick=()=>{state.route="detail";state.taskId=b.dataset.task;renderAll();window.scrollTo(0,0);});
  return card;
}
function renderNews(){
  const v=$("#view");v.innerHTML="";
  v.appendChild(el("div","crumb",`<b>情報</b> / 時事ニュース`));
  const connected=apiConnected();
  const head=el("div","newshead");
  if(connected&&realNews&&realNews.length){
    head.innerHTML=`<h1 style="font-size:21px;font-weight:800;margin:0">🗞️ 時事ニュース</h1><span class="live"><span class="pulse"></span>自動収集（本番）</span><span style="font-size:12px;color:var(--faint)">毎日07:00に自動収集</span>`;
  }else if(connected&&realNews&&!realNews.length){
    head.innerHTML=`<h1 style="font-size:21px;font-weight:800;margin:0">🗞️ 時事ニュース</h1><span class="live" style="background:var(--faint)"><span class="pulse"></span>本日分は未収集</span><span style="font-size:12px;color:var(--faint)">毎日07:00に自動収集・以下はサンプル</span>`;
  }else if(connected&&realNews===null){
    head.innerHTML=`<h1 style="font-size:21px;font-weight:800;margin:0">🗞️ 時事ニュース</h1><span class="live"><span class="pulse"></span>取得中…</span>`;
  }else{
    head.innerHTML=`<h1 style="font-size:21px;font-weight:800;margin:0">🗞️ 時事ニュース</h1><span class="live"><span class="pulse"></span>サンプル表示</span><span style="font-size:12px;color:var(--faint)">API接続で本番の自動収集に切り替わります</span>`;
  }
  v.appendChild(head);
  v.appendChild(el("p","libsub",`AI・業務に関わる最新情報を、収集エージェントが<b>自動で収集・要約して投稿</b>し続けます。<b>過去に出した情報とは重複しないよう生成</b>し、各ニュースは関連する業務タスクに紐づきます。${hasProfile()?"<b>あなたの業務に関係するニュースを上位表示</b>しています。":""}`));
  const feed=el("div","feed");
  const base=(connected&&realNews&&realNews.length)?realNews:liveNews;
  const ordered=hasProfile()?[...base].sort((a,b)=>(newsRelevant(b)?1:0)-(newsRelevant(a)?1:0)):base;
  ordered.forEach(n=>feed.appendChild(newsCard(n)));
  v.appendChild(feed);
  if(connected){
    if(realNews===null){
      fetchRealNews().then(items=>{realNews=items;if(state.route==="news")renderNews();});
    }
  }else{
    startNewsFeed();
  }
}
function startNewsFeed(){
  stopNewsFeed();
  newsTimer=setInterval(()=>{
    if(state.route!=="news"){stopNewsFeed();return;}
    // 「過去情報と重複しない」制約: 既出タイトルはスキップして次の候補を採用
    let src=null;
    for(let k=0;k<EXTRA_NEWS.length;k++){
      const cand=EXTRA_NEWS[(extraIdx+k)%EXTRA_NEWS.length];
      if(!liveNews.some(n=>n.title===cand.title)){src=cand;extraIdx+=k+1;break;}
    }
    if(!src){return;} // 全て既出なら投稿しない（重複を出さない）
    liveNews.forEach(n=>n.min=(n.min||0)+(n.min<60?1:60));
    const item={...src,id:"live"+extraIdx,min:0};
    liveNews.unshift(item);justPushed=item.id;
    if(liveNews.length>16)liveNews.pop();
    renderNews();
  },14000);
}
function stopNewsFeed(){if(newsTimer){clearInterval(newsTimer);newsTimer=null;}}

  w.innerHTML=`<h4>👋 無料会員へようこそ</h4><p>登録ありがとうございます。無料のまま辞書・ニュース・レクチャーを閲覧でき、AIエージェントは<b>月${FREE_LIMIT}本お試し</b>できます。</p>`;
  const chips=el("div","chips");
  [["📇 業務辞書を見る",{route:"library",cat:"all",q:"",tag:null}],["🗞️ 時事ニュース",{route:"news"}],["🚀 使い方レクチャー",{route:"setup"}],["🎯 パーソナライズ",{route:"profile"}]].forEach(([lb,patch])=>{const c=el("button","chip2",lb);c.onclick=()=>{Object.assign(state,patch);renderAll();window.scrollTo(0,0);};chips.appendChild(c);});
  w.appendChild(chips);v.appendChild(w);

  const status=el("div","panel");status.style.cssText="max-width:720px;margin-bottom:18px";
  status.innerHTML=`<h3>🧪 お試しの状況</h3><div class="pbar"><i style="width:${Math.min(100,used/FREE_LIMIT*100)}%"></i></div><div style="font-size:12.5px;color:var(--muted);margin-top:8px" class="tnum">今月 ${used}/${FREE_LIMIT} 本 ・ 残り ${remain} 本</div>`;
  v.appendChild(status);
  const cmp=el("div","pgroup");
  cmp.innerHTML=`<div class="pl">🔓 無料でできること</div><ul style="margin:0 0 14px;padding-left:20px;font-size:13.5px;color:var(--slate);line-height:1.9"><li>業務エージェント辞書の閲覧・検索・タグ横断</li><li>時事ニュース（鮮度情報）の閲覧</li><li>使い方レクチャー（初級〜上級）</li><li>AIエージェントの実行 月${FREE_LIMIT}本お試し</li></ul><div class="pl">🔒 有料で解放されること</div><ul style="margin:0;padding-left:20px;font-size:13.5px;color:var(--muted);line-height:1.9"><li>エージェント実行回数（標準 月${STD_LIMIT}本／プレミアム 無制限）</li><li>成果物のダウンロード上限の解放</li><li>連携ワークフロー・パーソナライズのフル利用</li></ul>`;
  v.appendChild(cmp);
  const up=el("button","planbtn up","💳 プランを見てアップグレード");up.style.cssText="width:auto;padding:12px 20px;margin-top:4px";up.onclick=()=>{state.route="plans";renderAll();window.scrollTo(0,0);};
  v.appendChild(up);
  if(hasProfile()&&recommended().length){
    const rb=el("div","newband");rb.style.marginTop="22px";
    rb.innerHTML=`<h4>🎯 あなたへのおすすめ</h4><p>設定に合わせたエージェントです。まずはお試しで実行してみましょう。</p>`;
    const rc=el("div","chips");recommended().forEach(t=>{const c=el("button","chip2",`🤖 ${t.agent.name}`);c.onclick=()=>{state.route="detail";state.taskId=t.id;renderAll();window.scrollTo(0,0);};rc.appendChild(c);});
    rb.appendChild(rc);v.appendChild(rb);
  }
}

/* パーソナライズ設定 */
function renderProfile(){
  const v=$("#view");v.innerHTML="";const p=getProfile();
  v.appendChild(el("div","crumb",`<b>マイページ</b> / パーソナライズ設定`));
  const head=el("div","libhead");head.innerHTML=`<h1><span>🎯</span> パーソナライズ設定</h1>`;v.appendChild(head);
  v.appendChild(el("p","libsub","あなたの<b>業界・職種・関心</b>に合わせて、おすすめエージェントや情報を最適化します。選ぶと自動保存されます。"));
  const g1=el("div","pgroup");g1.appendChild(el("div","pl","🏢 業界（1つ）"));
  const c1=el("div","charcards");INDUSTRIES.forEach(ind=>{
    const ic=INDUSTRY_CHAR[ind];
    const b=el("button","charcard"+(p.industry===ind?" on":""));
    b.innerHTML=`${charIcon(ic,false)}<span><span class="charname">${ind}</span><span class="charline">${ic.line}</span></span>`;
    b.onclick=()=>{p.industry=(p.industry===ind?null:ind);setProfile(p);renderProfile();};
    c1.appendChild(b);
  });g1.appendChild(c1);v.appendChild(g1);
  const g2=el("div","pgroup");g2.appendChild(el("div","pl","💼 職種（1つ）"));
  const c2=el("div","pchips");ROLES.forEach(r=>{const b=el("button","tagchip"+(p.role===r.key?" on":""),r.label);b.onclick=()=>{p.role=(p.role===r.key?null:r.key);setProfile(p);renderProfile();};c2.appendChild(b);});g2.appendChild(c2);v.appendChild(g2);
  const g3=el("div","pgroup");g3.appendChild(el("div","pl","🏷️ 関心のある“やること”（複数可）"));
  const c3=el("div","pchips");TAG_LIST.forEach(tg=>{const on=(p.tags||[]).includes(tg);const b=el("button","tagchip"+(on?" on":""),tg);b.onclick=()=>{p.tags=p.tags||[];p.tags=on?p.tags.filter(x=>x!==tg):p.tags.concat(tg);setProfile(p);renderProfile();};c3.appendChild(b);});g3.appendChild(c3);v.appendChild(g3);
  const g4=el("div","pgroup");
  g4.appendChild(el("div","pl","🏢 事業内容・サービス（自由記述・任意）"));
  g4.appendChild(el("p","libsub",'エージェントを実行するとき、この内容を踏まえて成果物を作ります（例: 「横浜市の注文住宅・リフォーム会社。戸建てのリノベーションが中心。」）。'));
  const bizBox=el("textarea");bizBox.className="pbiz";bizBox.placeholder="あなたの会社・事業について、わかる範囲で書いてください";bizBox.value=p.bizDesc||"";
  bizBox.onchange=()=>{const pp=getProfile();pp.bizDesc=bizBox.value.trim();setProfile(pp);toast("事業内容を保存しました","🏢");};
  g4.appendChild(bizBox);v.appendChild(g4);
  const rl=roleOf(p.role);
  v.appendChild(el("p","libsub",hasProfile()?`設定済み: ${p.industry||"—"} ／ ${rl?rl.label:"—"} ／ 関心タグ ${(p.tags||[]).length}件 ／ 事業内容 ${p.bizDesc?"入力済み":"未入力"}`:"まだ設定されていません。"));
  const act=el("div");act.style.cssText="display:flex;gap:10px;flex-wrap:wrap;align-items:center";
  const go=el("button","planbtn up","🎯 おすすめエージェントを見る");go.style.cssText="width:auto;padding:11px 18px;margin-top:0";
  go.onclick=()=>{state.route="library";state.cat="all";state.q="";state.tag=null;renderAll();window.scrollTo(0,0);};
  act.appendChild(go);
  const clr=el("button","tagclear","設定をクリア");clr.style.marginLeft="0";clr.onclick=()=>{setProfile({industry:null,role:null,tags:[],bizDesc:""});renderProfile();toast("設定をクリアしました");};
  act.appendChild(clr);v.appendChild(act);
}

/* 作成リクエストフォーム（入口A: ユーザー本人が依頼・契約者アカウント限定） */
const isSubscriber=()=>getPlan()!=="free";
function openRequestForm(name,cat){
  if(!isSubscriber()){
    openModal("🔒 作成リクエストは契約者限定です","AIエージェントの作成リクエストは、有料プラン（標準・プレミアム）の契約者アカウントのみご利用いただけます。無料プランでは辞書・ニュース・お試し実行までご利用いただけます。",
      `<button class="btn get" id="toPlansFromReq">プランを見てアップグレード</button>`);
    const b=$("#toPlansFromReq");if(b)b.onclick=()=>{$("#mscrim").classList.remove("on");state.route="plans";renderAll();window.scrollTo(0,0);};
    return;
  }
  openModal("🛠️ エージェント作成をリクエスト","欲しい業務のエージェントを依頼します。生成→検証AIを通過すると、承認キューに下書きとして並びます。",
    `<div class="reqfield"><label>業務名</label><input id="rqName" value="${(name||"").replace(/"/g,"&quot;")}"></div>
     <div class="reqfield"><label>やりたいこと</label><textarea id="rqWant" placeholder="例: 検索結果から見込み客を、新規リードだけ抽出したい"></textarea></div>
     <div class="reqfield"><label>入力の例</label><input id="rqIn" placeholder="例: 検索条件・既存の顧客台帳"></div>
     <div class="reqfield"><label>欲しい出力の例（任意・精度が上がります）</label><textarea id="rqOut" placeholder="例: 会社名・担当・連絡先の一覧表"></textarea></div>
     <button class="btn get" id="rqSubmit">リクエストを送信</button>`);
  const s=$("#rqSubmit");if(s)s.onclick=()=>{
    const nm=($("#rqName").value||"").trim()||"（無題の業務）";
    const drafts=getDrafts();
    drafts.unshift({id:"u"+getUsage()+"_"+nm.length+"_"+drafts.length,name:nm,source:"user",origin:"ユーザー依頼",cat:cat||"SP01",
      inSpec:($("#rqIn").value||"").trim()||"—",outSpec:($("#rqOut").value||"").trim()||"（生成AIが定義）",
      prompt:`${nm}を行うエージェント。依頼「${($("#rqWant").value||"").trim()||"（未記入）"}」に基づき、入力を受けて成果物を出力する。`,
      sample:"（検証AIがサンプル出力を生成します）",status:"draft"});
    saveDrafts(drafts);$("#mscrim").classList.remove("on");
    toast("リクエストを送信しました。検証後、承認キューに並びます","🛠️");renderAll();
  };
}
/* 承認キュー（下書き→人が承認で正式公開） */
function renderReview(){
  const v=$("#view");v.innerHTML="";
  v.appendChild(el("div","crumb",`<b>運営</b> / 承認キュー`));
  if(!isAdmin()){v.appendChild(el("div","empty",`<div class="big">🔒</div>この画面は<b>管理者アカウント</b>のみアクセスできます。<br><span style="font-size:12px">（設定 ＞ 管理者モードで切替・デモ）</span>`));return;}
  const head=el("div","libhead");head.innerHTML=`<h1><span>📥</span> 承認キュー（下書き）</h1>`;
  head.appendChild(el("span","count",`承認待ち ${pendingDrafts()} 件`));v.appendChild(head);
  v.appendChild(el("p","libsub","検証AIを通過したエージェントの<b>下書き</b>です。内容を確認して<b>承認すると正式公開</b>されます（人間レビューが最終ゲート）。🌐外部情報からの自動生成分と、👤ユーザー依頼分が並びます。"));
  const pending=getDrafts().filter(d=>d.status==="draft");
  if(pending.length===0){v.appendChild(el("div","empty",`<div class="big">✅</div>承認待ちの下書きはありません。`));return;}
  pending.forEach(d=>{
    const cat=catOf(d.cat)||catOf("all");
    const it=el("div","qitem");
    it.innerHTML=`<div class="qh"><span class="qname">${d.name}</span><span class="qsrc ${d.source}">${d.source==="auto"?"🌐 外部情報":"👤 ユーザー依頼"}</span><span class="qpass">✓ 検証AI通過</span></div>
      <div style="font-size:11.5px;color:var(--faint)">由来: ${d.origin} ・ カテゴリ: ${cat.label}</div>
      <div class="qdef"><b>入力</b> ${d.inSpec} → <b>出力</b> ${d.outSpec}<br><b>プロンプト概要</b> ${d.prompt}</div>
      <div class="qdef" style="background:#fff"><b>サンプル出力</b><br>${d.sample}</div>`;
    const acts=el("div","qacts");
    const ok=el("button","qbtn ok","承認して公開");ok.onclick=()=>{const all=getDrafts();const x=all.find(z=>z.id===d.id);if(x)x.status="approved";saveDrafts(all);publishDraft(d);toast(`「${d.name}」を辞書に公開しました（使える状態に）`,"✅");renderAll();};
    const ng=el("button","qbtn ng","差し戻し");ng.onclick=()=>{const all=getDrafts();const x=all.find(z=>z.id===d.id);if(x)x.status="rejected";saveDrafts(all);toast("差し戻しました");renderAll();};
    acts.append(ok,ng);it.appendChild(acts);v.appendChild(it);
  });
}

function openSettings(){
  const admin=isAdmin();const base=getApiBase();
  openModal("⚙ 設定","アカウントと接続の設定（プロトタイプ）。",
    `<div class="reqfield"><label>🔑 管理者モード（デモ）</label>
       <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">承認キューは<b>管理者アカウントのみ</b>表示。本番はサーバー側の認可で判定します。</div>
       <button class="btn ${admin?'have':'get'}" id="adminToggle">${admin?'✓ 管理者モード ON（メンバーに戻す）':'管理者モードにする'}</button>
     </div>
     <div class="reqfield" style="margin-top:18px"><label>🔌 APIのURL（本番接続）</label>
       <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">設定すると「使う」「ワークフロー実行」が<b>本物のAPI</b>を呼びます。空なら<b>サンプル</b>で動作。</div>
       <input id="apiBase" placeholder="https://your-api.example.com" value="${(base||'').replace(/"/g,'&quot;')}"></div>
     <div class="reqfield"><label>APIキー（任意）</label><input id="apiKey" placeholder="pk_..." value="${(getApiKey()||'').replace(/"/g,'&quot;')}"></div>
     <button class="btn get" id="apiSave">接続設定を保存</button>
     <div style="font-size:11.5px;color:var(--faint);margin-top:8px">状態: ${base?'🟢 接続設定あり（本物のAPIを呼びます）':'⚪ 未接続（サンプル出力）'}</div>`);
  const b=$("#adminToggle");if(b)b.onclick=()=>{setRole(admin?"member":"admin");$("#mscrim").classList.remove("on");toast(admin?"メンバーに戻しました":"管理者モードにしました","🔑");if(!isAdmin()&&state.route==="review")state.route="library";renderAll();};
  const sv=$("#apiSave");if(sv)sv.onclick=()=>{localStorage.setItem(API_BASE_KEY,($("#apiBase").value||'').trim());localStorage.setItem(API_KEY_KEY,($("#apiKey").value||'').trim());realNews=null;$("#mscrim").classList.remove("on");toast(getApiBase()?"APIに接続する設定を保存しました":"未接続（サンプル）に戻しました","🔌");renderAll();};
}
$("#diagBtn").onclick=openDiag;
$("#planChip").onclick=()=>{state.route="plans";renderAll();window.scrollTo(0,0);};
$("#segLib").onclick=()=>{state.route="library";renderAll();};
$("#segMine").onclick=()=>{state.route="mine";renderAll();};

const myCount=()=>[...owned].filter(id=>{const t=taskById(id);return t&&t.agent;}).length;
function renderAll(){
  if(state.route!=="news")stopNewsFeed();
  updatePlanChip();
  renderSide();
  $("#segLib").classList.toggle("active",state.route==="library"||state.route==="detail");
  $("#segMine").classList.toggle("active",state.route==="mine");
  if(state.route==="detail")renderDetail();
  else if(state.route==="mine")renderMine();
  else if(state.route==="news")renderNews();
  else if(state.route==="setup")renderSetup();
  else if(state.route==="lesson")renderLesson();
  else if(state.route==="flows")renderFlows();
  else if(state.route==="flow")renderFlow();
  else if(state.route==="plans")renderPlans();
  else if(state.route==="profile")renderProfile();
  else if(state.route==="free")renderFree();
  else if(state.route==="review")renderReview();
  else renderLibrary();
}
$(".icobtn[title='お知らせ']").onclick=()=>{state.route="news";renderAll();window.scrollTo(0,0);};
/* 初回訪問オンボーディング：業種を1タップ選ぶだけでパーソナライズが完了する（会議決定：診断フローを最初に挿入） */
const ONBOARD_KEY="task-onboarded-v1";
function maybeShowOnboarding(){
  if(hasProfile()||localStorage.getItem(ONBOARD_KEY))return;
  const cards=INDUSTRIES.map(ind=>{
    const ic=INDUSTRY_CHAR[ind];
    return `<button class="charcard onboard-pick" data-ind="${ind}">${charIcon(ic,false)}<span><span class="charname">${ind}</span><span class="charline">${ic.line}</span></span></button>`;
  }).join("");
  openModal("👋 はじめまして","まずはあなたの業種を選んでください。おすすめのエージェントをすぐにご案内します（あとから設定で変更できます）。",
    `<div class="charcards">${cards}</div><button class="btn use" id="onboardSkip" style="margin-top:14px">あとで設定する</button>`);
  document.querySelectorAll(".onboard-pick").forEach(b=>{
    b.onclick=()=>{
      const p=getProfile();p.industry=b.dataset.ind;setProfile(p);
      localStorage.setItem(ONBOARD_KEY,"1");
      $("#mscrim").classList.remove("on");
      toast(`${b.dataset.ind}に合わせておすすめを表示します`,"🎯");
      renderAll();
    };
  });
  const skip=$("#onboardSkip");if(skip)skip.onclick=()=>{localStorage.setItem(ONBOARD_KEY,"1");$("#mscrim").classList.remove("on");};
}
renderAll();
maybeShowOnboarding();
</script>
