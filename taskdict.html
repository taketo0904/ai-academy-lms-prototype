<title>業務AIエージェント辞書 — タスクディクショナリ プロトタイプ</title>
<style>
  :root{
    --paper:#F6F7F4; --card:#FFFFFF; --ink:#1A2233; --muted:#5B6472; --faint:#8A93A3;
    --line:#E6E8E3; --line2:#D3D7CF; --teal:#0F766E; --teal-wash:#E2F1EF; --teal-ink:#0B5A54;
    --amber:#B45309; --amber-wash:#FBEEDC; --green:#15803D; --green-wash:#E4F3E8;
    --violet:#6D46C7; --violet-wash:#EEE9F9; --slate:#334155;
    --shadow:0 1px 2px rgba(26,34,51,.05),0 8px 24px rgba(26,34,51,.06);
    --shadow-lg:0 16px 44px rgba(26,34,51,.18);
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.6}
  button{font-family:inherit;cursor:pointer}
  .tnum{font-variant-numeric:tabular-nums}
  .mono{font-family:var(--mono)}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}

  /* topbar */
  .top{position:sticky;top:0;z-index:40;height:60px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 20px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.04em;font-size:15px}
  .logo .m{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal),#12b5a6);display:grid;place-items:center;color:#fff;font-size:15px}
  .logo small{display:block;font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.02em}
  .top .spacer{flex:1}
  .tbtn{border:1px solid var(--line2);background:#fff;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;color:var(--slate);display:flex;align-items:center;gap:7px}
  .tbtn:hover{background:var(--paper)}
  .tbtn.pri{background:var(--teal);color:#fff;border-color:var(--teal)}
  .tbtn.pri:hover{background:var(--teal-ink)}
  .tbtn .ct{background:var(--teal-wash);color:var(--teal-ink);font-size:11px;font-weight:800;border-radius:20px;padding:1px 7px}
  .tbtn.pri .ct{background:rgba(255,255,255,.25);color:#fff}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#7ec8bf);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}

  .layout{display:grid;grid-template-columns:238px 1fr;align-items:start}
  .side{position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;border-right:1px solid var(--line);background:var(--card);padding:16px 12px}
  .side .ttl{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.08em;padding:12px 12px 6px;text-transform:uppercase}
  .nav{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;text-align:left;padding:9px 12px;border-radius:9px;font-size:13.5px;color:var(--ink);font-weight:500}
  .nav .ic{width:22px;text-align:center;font-size:15px;flex-shrink:0}
  .nav .code{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .nav .ct{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
  .nav:hover{background:var(--paper)}
  .nav.active{background:var(--teal-wash);color:var(--teal-ink);font-weight:700}
  .nav.active .ct{color:var(--teal-ink)}

  .main{padding:24px 28px 70px;min-width:0}
  .crumb{font-size:12.5px;color:var(--faint);margin-bottom:14px}
  .crumb b{color:var(--muted);font-weight:600}
  .h1{font-size:22px;font-weight:800;letter-spacing:-.01em;margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 20px;max-width:70ch}

  .searchrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  .search{flex:1;min-width:240px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line2);border-radius:11px;padding:11px 14px}
  .search:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash)}
  .search input{border:none;outline:none;font-size:14.5px;width:100%;background:transparent;color:var(--ink)}
  .search .ic{color:var(--faint);font-size:15px}
  .count{font-size:12.5px;color:var(--muted);font-weight:600;background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:11px;white-space:nowrap}

  .midgrp{margin-bottom:26px}
  .midh{font-size:13px;font-weight:800;color:var(--slate);margin:0 0 11px;display:flex;align-items:center;gap:9px}
  .midh .code{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:600}
  .midh .line{flex:1;height:1px;background:var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;text-align:left;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s,border-color .14s;display:flex;flex-direction:column;gap:9px;width:100%}
  .task:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--line2)}
  .task .tcode{font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:600}
  .task .tname{font-size:14.5px;font-weight:700;line-height:1.45}
  .task .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
  .b{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px}
  .b.ready{background:var(--green-wash);color:var(--green)}
  .b.build{background:var(--amber-wash);color:var(--amber)}
  .b.fresh{background:var(--violet-wash);color:var(--violet)}
  .b.owned{background:var(--teal-wash);color:var(--teal-ink)}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(26,34,51,.42);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:94vw;background:var(--card);z-index:70;box-shadow:var(--shadow-lg);transform:translateX(102%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .dh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .dh .x{margin-left:auto;border:1px solid var(--line2);background:#fff;width:32px;height:32px;border-radius:9px;font-size:15px;color:var(--muted);display:grid;place-items:center;flex-shrink:0}
  .dh .x:hover{background:var(--paper)}
  .dh .dcode{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:600}
  .dh h3{font-size:18px;margin:3px 0 0;font-weight:800;line-height:1.35}
  .dbody{padding:20px 22px;overflow-y:auto;flex:1}
  .dsec{margin-bottom:22px}
  .dsec .lb{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px}
  .dsec p{font-size:13.5px;color:var(--slate);margin:0;line-height:1.7}
  .agentbox{background:linear-gradient(135deg,var(--teal-wash),#fff);border:1px solid #bfe0db;border-radius:12px;padding:15px}
  .agentbox .an{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
  .agentbox .atag{font-size:12px;color:var(--teal-ink);font-weight:600;margin:2px 0 8px}
  .agentbox .ad{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:13px}
  .btn{border:none;border-radius:10px;font-size:13.5px;font-weight:800;padding:11px 14px;width:100%;transition:background .15s,transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn.get{background:var(--teal);color:#fff}
  .btn.get:hover{background:var(--teal-ink)}
  .btn.use{background:var(--ink);color:#fff}
  .btn.have{background:var(--green-wash);color:var(--green);cursor:default}
  .buildbox{background:var(--amber-wash);border:1px solid #eccf9f;border-radius:12px;padding:15px}
  .buildbox .bh{font-weight:800;font-size:14px;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .buildbox p{font-size:12.5px;color:#7a4a0e;margin:0 0 13px;line-height:1.6}
  .btn.req{background:var(--amber);color:#fff}
  .freshcard{border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:#fff}
  .freshcard .ft{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
  .freshcard .fm{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6}
  .freshcard .fd{font-size:11px;color:var(--faint);margin-top:7px}
  .persona{font-size:11px;color:var(--violet);font-weight:700;background:var(--violet-wash);padding:2px 8px;border-radius:20px}

  .empty{text-align:center;padding:70px 20px;color:var(--faint)}
  .empty .big{font-size:40px;margin-bottom:12px}

  /* modal */
  .mscrim{position:fixed;inset:0;background:rgba(26,34,51,.5);backdrop-filter:blur(3px);z-index:80;display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .mscrim.on{opacity:1;pointer-events:auto}
  .modal{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);transform:scale(.96);transition:transform .2s;max-height:88vh;overflow-y:auto}
  .mscrim.on .modal{transform:scale(1)}
  .modal h3{font-size:19px;margin:0 0 4px;font-weight:800}
  .modal .msub{font-size:13.5px;color:var(--muted);margin:0 0 18px}
  .diag{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
  .diag .dn{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--teal-wash);color:var(--teal-ink);display:grid;place-items:center;font-weight:800;font-size:14px}
  .diag .dt{font-weight:800;font-size:14px}
  .diag .dd{font-size:12.5px;color:var(--muted);line-height:1.6}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;opacity:0;transition:opacity .25s,transform .25s;display:flex;align-items:center;gap:10px;max-width:92vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .em{font-size:18px}

  @media(max-width:760px){.layout{grid-template-columns:1fr}.side{display:none}.main{padding:18px}}
</style>

<div class="top">
  <div class="logo"><span class="m">◎</span><span>TASK AGENTS<small>業務AIエージェント辞書</small></span></div>
  <div class="spacer"></div>
  <button class="tbtn" id="diagBtn">🧭 業務診断</button>
  <button class="tbtn pri" id="myBtn">🤖 マイエージェント <span class="ct tnum" id="myCt">0</span></button>
  <div class="avatar">中川</div>
</div>

<div class="layout">
  <nav class="side" id="side"></nav>
  <main class="main" id="view"></main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<script>

const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const OKEY="task-agents-owned-v1";
let owned=new Set(JSON.parse(localStorage.getItem(OKEY)||"[]"));
const saveOwned=()=>localStorage.setItem(OKEY,JSON.stringify([...owned]));
let state={cat:"all", q:""};

/* toast */
let tt;
function toast(msg,em="✓"){let t=$("#toast");if(!t){t=el("div","toast");t.id="toast";document.body.appendChild(t);}
  t.innerHTML=`<span class="em">${em}</span><span>${msg}</span>`;requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2900);}

/* filter */
function filtered(){
  let list=TASKS.filter(t=>state.cat==="all"||t.cat===state.cat);
  if(state.q){const q=state.q.toLowerCase();
    list=list.filter(t=>t.name.toLowerCase().includes(q)||t.code.toLowerCase().includes(q)||t.mid.toLowerCase().includes(q)||(t.agent&&t.agent.name.toLowerCase().includes(q)));}
  return list;
}

/* sidebar */
function renderSide(){
  const nav=$("#side");nav.innerHTML="";
  nav.appendChild(el("div","ttl","業務カテゴリ（大分類）"));
  CATS.forEach(c=>{
    const n=c.code==="all"?TASKS.length:TASKS.filter(t=>t.cat===c.code).length;
    const b=el("button","nav"+(state.cat===c.code?" active":""));
    b.innerHTML=`<span class="ic">${c.icon}</span><span>${c.label}${c.code!=="all"?` <span class="code">${c.code}</span>`:""}</span><span class="ct tnum">${n}</span>`;
    b.onclick=()=>{state.cat=c.code;state.q="";renderAll();};
    nav.appendChild(b);
  });
}

/* main */
function renderMain(){
  const v=$("#view");v.innerHTML="";
  const cat=CATS.find(c=>c.code===state.cat);
  v.appendChild(el("div","crumb",`<b>業務AIエージェント辞書</b> / ${cat.code==="all"?"すべての業務":cat.label}`));
  v.appendChild(el("div","h1",`<span>${cat.icon}</span> ${cat.code==="all"?"すべての業務タスク":cat.label}`));
  v.appendChild(el("p","sub","業務を細かくタスク単位に分解し、それぞれに<b>すぐ使えるAIエージェント</b>を紐づけています。まだ無いタスクは「1日以内で作成」をリクエストできます。"));

  const list=filtered();
  const row=el("div","searchrow");
  const s=el("div","search",`<span class="ic">⌕</span>`);
  const inp=el("input");inp.placeholder="業務・タスク名・コードで検索（例: 請求書 / 議事録 / SP02）";inp.value=state.q;
  let caret=state.q.length;
  inp.oninput=e=>{state.q=e.target.value;caret=e.target.selectionStart;renderMain();const ni=$(".search input");if(ni){ni.focus();ni.setSelectionRange(caret,caret);}};
  s.appendChild(inp);row.appendChild(s);
  const ready=list.filter(t=>t.status==="ready").length;
  row.appendChild(el("div","count",`${list.length} タスク ・ <b style="color:var(--green)">${ready}</b> 整備済み`));
  v.appendChild(row);

  if(list.length===0){v.appendChild(el("div","empty",`<div class="big">🔍</div>該当する業務タスクがありません。<br>別のキーワードでお試しください。`));return;}

  // group by mid (中分類), preserving order
  const groups=[];
  list.forEach(t=>{let g=groups.find(x=>x.mid===t.mid&&x.cat===t.cat);if(!g){g={mid:t.mid,cat:t.cat,items:[]};groups.push(g);}g.items.push(t);});
  groups.forEach(g=>{
    const gw=el("div","midgrp");
    const catObj=CATS.find(c=>c.code===g.cat);
    gw.appendChild(el("div","midh",`<span>${g.mid}</span><span class="code">${catObj?catObj.label:""}</span><span class="line"></span>`));
    const grid=el("div","grid");
    g.items.forEach(t=>grid.appendChild(taskCard(t)));
    gw.appendChild(grid);
    v.appendChild(gw);
  });
}

function taskCard(t){
  const has=t.agent&&owned.has(t.id);
  const c=el("button","task");
  let badges="";
  if(has)badges+=`<span class="b owned">✓ 受け取り済み</span>`;
  else if(t.status==="ready")badges+=`<span class="b ready">● 使えるAIあり</span>`;
  else badges+=`<span class="b build">＋ 1日で作成可</span>`;
  if(t.fresh)badges+=`<span class="b fresh">✦ 新鮮情報</span>`;
  c.innerHTML=`<div class="tcode">${t.code}</div><div class="tname">${t.name}</div><div class="badges">${badges}</div>`;
  c.onclick=()=>openDrawer(t.id);
  return c;
}

/* drawer */
let escBound=false;
function closeDrawer(){$("#drawer").classList.remove("on");$("#scrim").classList.remove("on");}
function openDrawer(id){
  const t=TASKS.find(x=>x.id===id);
  const d=$("#drawer");const has=t.agent&&owned.has(t.id);
  const cat=CATS.find(c=>c.code===t.cat);
  let action="";
  if(t.status==="ready"){
    action=`<div class="agentbox">
      <div class="an">🤖 ${t.agent.name}</div>
      <div class="atag">${t.agent.tag}</div>
      <div class="ad">${t.agent.desc}</div>
      ${has?`<button class="btn have">✓ 受け取り済み（マイエージェント）</button>
             <button class="btn use" style="margin-top:8px" data-use="1">▶ このエージェントを使う</button>`
           :`<button class="btn get" data-get="1">＋ このエージェントを受け取る</button>`}
    </div>`;
  }else{
    action=`<div class="buildbox">
      <div class="bh">🛠️ まだ専用エージェントがありません</div>
      <p>この業務タスクのエージェントは未整備です。リクエストいただければ<b>1日以内に作成</b>してマイエージェントに追加します。</p>
      <button class="btn req" data-req="1">この業務のエージェントを作ってもらう</button>
    </div>`;
  }
  const fresh=t.fresh?`<div class="dsec"><div class="lb">新鮮情報 <span class="persona">あなた向け</span></div>
     <div class="freshcard"><div class="ft">✦ この業務に関わる最新AI情報</div>
     <div class="fm">「${t.name}」に効く新しいツール・手法をパーソナライズして要約・解説してお届けします（本番では毎日更新）。</div>
     <div class="fd">例: 最新モデルでの精度向上・新機能の使いどころ を、あなたの業務文脈に合わせて。</div></div></div>`:"";
  d.innerHTML=`
    <div class="dh">
      <div><div class="dcode">${t.code} ・ ${cat?cat.label:""} ／ ${t.mid}</div><h3>${t.name}</h3></div>
      <button class="x" data-x="1">✕</button>
    </div>
    <div class="dbody">
      <div class="dsec"><div class="lb">この業務でできること</div><p>${t.name}を、AIエージェントに任せて短時間で仕上げます。入力を渡すだけで、下書き・整形・チェックまでを自動化します。</p></div>
      <div class="dsec"><div class="lb">${t.status==="ready"?"使えるAIエージェント":"エージェント作成"}</div>${action}</div>
      ${fresh}
    </div>`;
  d.querySelector('[data-x]').onclick=closeDrawer;
  const g=d.querySelector('[data-get]');if(g)g.onclick=()=>{owned.add(t.id);saveOwned();toast(`「${t.agent.name}」を受け取りました`,"🎉");openDrawer(id);renderAll();};
  const u=d.querySelector('[data-use]');if(u)u.onclick=()=>toast(`「${t.agent.name}」を起動します（プロトタイプ）`,"🤖");
  const r=d.querySelector('[data-req]');if(r)r.onclick=()=>{toast(`「${t.name}」のエージェント作成を受け付けました（1日以内）`,"🛠️");closeDrawer();};
  d.classList.add("on");$("#scrim").classList.add("on");
  if(!escBound){escBound=true;document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});}
}
$("#scrim").onclick=closeDrawer;

/* my agents modal */
function openMy(){
  const mine=TASKS.filter(t=>owned.has(t.id));
  openModal(`🤖 マイエージェント <span style="color:var(--faint);font-weight:600">${mine.length}</span>`,
    mine.length?"受け取り済みのエージェント。各業務ですぐ使えます。":"まだ受け取ったエージェントはありません。",
    mine.length?mine.map(t=>`<div class="diag"><div class="dn">🤖</div><div><div class="dt">${t.agent.name}</div><div class="dd">${t.name}（${t.code}）</div></div></div>`).join("")
      :`<div class="empty" style="padding:24px"><div class="big">🤖</div>業務タスクを開いて「受け取る」を押すと、ここに貯まります。</div>`);
}

/* 業務診断 modal */
function openDiag(){
  openModal("🧭 業務診断",
    "あなたの業務に合わせて、基礎知識・業務特化・新鮮情報・スキル運用を診断し、最適なエージェントの組み合わせを提案します（プロトタイプ）。",
    [["1","業務パターンの特定","日々の業務をタスク辞書に照合し、あなたの業務パターンを分類。"],
     ["2","基礎知識 × 業務特化","業務に必要な基礎と、業界ではなく“業務”に特化した勘所を提示。"],
     ["3","新鮮情報の接続","その業務に効く最新AI情報を、あなた向けにパーソナライズして継続配信。"],
     ["4","スキル（エージェント）運用","必要なAIエージェントを割り当て、未整備は1日以内で作成。"]]
     .map(([n,t,d])=>`<div class="diag"><div class="dn">${n}</div><div><div class="dt">${t}</div><div class="dd">${d}</div></div></div>`).join("")
     +`<button class="btn get" style="margin-top:8px" onclick="document.querySelector('.mscrim').classList.remove('on')">診断を始める（プロトタイプ）</button>`);
}
function openModal(title,sub,inner){
  let m=$("#mscrim");if(!m){m=el("div","mscrim");m.id="mscrim";document.body.appendChild(m);m.onclick=e=>{if(e.target===m)m.classList.remove("on");};}
  m.innerHTML=`<div class="modal"><h3>${title}</h3><p class="msub">${sub}</p>${inner}</div>`;
  requestAnimationFrame(()=>m.classList.add("on"));
}
$("#myBtn").onclick=openMy;
$("#diagBtn").onclick=openDiag;

function renderAll(){renderSide();renderMain();$("#myCt").textContent=[...owned].filter(id=>TASKS.find(t=>t.id===id&&t.agent)).length;}
renderAll();
</script>
